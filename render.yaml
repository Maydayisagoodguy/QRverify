services:
  - type: web
    name: qr-verify-system
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node src/app.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HMAC_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ALERT_EMAIL
        sync: false
      - key: VERIFY_BASE_URL
        sync: false
      - key: ADMIN_API_KEY
        sync: false
