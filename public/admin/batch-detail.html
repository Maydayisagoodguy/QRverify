<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Batch Detail — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #F4F4F5;
      --surface: #FFFFFF;
      --border:  #E4E4E7;
      --text:    #09090B;
      --muted:   #71717A;
      --accent:  #B81F24;
      --accent2: #6366F1;
      --green:   #16A34A;
      --yellow:  #CA8A04;
      --red:     #DC2626;
      --radius:  10px;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Layout ── */
    .layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: 220px; min-height: 100vh; background: var(--surface);
      border-right: 1px solid var(--border); padding: 24px 0;
      display: flex; flex-direction: column; gap: 4px; position: fixed; top: 0; left: 0; bottom: 0; z-index: 10;
    }
    .sidebar-brand {
      padding: 0 20px 20px; border-bottom: 1px solid var(--border); margin-bottom: 8px;
      display: flex; align-items: center; gap: 10px;
    }
    .sidebar-brand img { height: 32px; }
    .sidebar-brand span { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.05em; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 8px 20px;
      font-size: 13px; font-weight: 500; color: var(--muted); text-decoration: none; border-radius: 0;
      transition: background 0.15s, color 0.15s; cursor: pointer; border: none; background: none; width: 100%; text-align: left;
    }
    .nav-item:hover { background: var(--bg); color: var(--text); }
    .nav-item.active { background: #FEF2F2; color: var(--accent); font-weight: 600; }
    .nav-icon { font-size: 16px; width: 20px; text-align: center; }
    .main { margin-left: 220px; flex: 1; padding: 32px; }

    /* ── Header ── */
    .page-header {
      display: flex; align-items: center; gap: 12px; margin-bottom: 28px;
    }
    .back-btn {
      display: flex; align-items: center; gap: 6px; padding: 6px 14px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      font-size: 13px; font-weight: 500; color: var(--muted); text-decoration: none;
      transition: all 0.15s;
    }
    .back-btn:hover { color: var(--text); border-color: #aaa; }
    .page-title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
    .page-subtitle { font-size: 13px; color: var(--muted); margin-top: 2px; }

    /* ── Stat cards ── */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 18px 20px;
    }
    .stat-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .stat-value { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }

    /* ── Card ── */
    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      margin-bottom: 20px; overflow: hidden;
    }
    .card-header {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
    }
    .card-title { font-size: 14px; font-weight: 600; }
    .card-body { padding: 20px; }

    /* ── Remark tool ── */
    .remark-form {
      display: flex; align-items: flex-end; gap: 10px; flex-wrap: wrap;
    }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .form-input {
      height: 36px; padding: 0 12px; border: 1px solid var(--border); border-radius: 6px;
      font-size: 13px; font-family: inherit; color: var(--text); background: var(--bg);
      outline: none; transition: border-color 0.15s;
    }
    .form-input:focus { border-color: var(--accent2); background: #fff; }
    .form-input[type=number] { width: 90px; }
    .form-input.remark-text { width: 280px; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px; height: 36px; padding: 0 16px;
      border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer;
      border: none; transition: all 0.15s; font-family: inherit;
    }
    .btn-primary { background: var(--accent2); color: #fff; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-outline {
      background: var(--surface); color: var(--text); border: 1px solid var(--border);
    }
    .btn-outline:hover { background: var(--bg); }
    .btn-sm { height: 28px; padding: 0 10px; font-size: 12px; }
    .btn-download { background: var(--accent); color: #fff; }
    .btn-download:hover { background: #9a1a1e; }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .filter-select {
      height: 36px; padding: 0 12px; border: 1px solid var(--border); border-radius: 6px;
      font-size: 13px; font-family: inherit; color: var(--text); background: var(--surface);
      outline: none; min-width: 200px;
    }

    /* ── Serial table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border); white-space: nowrap; background: var(--bg);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }
    tbody td { padding: 10px 14px; vertical-align: middle; }
    .seq-badge {
      font-family: 'Courier New', monospace; font-size: 12px; font-weight: 700;
      color: var(--accent2); background: #EEF2FF; padding: 2px 8px; border-radius: 4px;
    }
    .status-badge {
      display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 999px;
    }
    .status-active   { background: #DCFCE7; color: #166534; }
    .status-inactive { background: #FEE2E2; color: #991B1B; }
    .serial-text {
      font-family: 'Courier New', monospace; font-size: 11px; color: var(--muted);
      max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .remark-cell { max-width: 200px; }
    .remark-pill {
      display: inline-block; background: #F0FDF4; color: #166534; border: 1px solid #BBF7D0;
      border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 500; max-width: 180px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .no-remark { color: var(--muted); font-size: 12px; }
    .scan-count { font-weight: 600; color: var(--text); }
    .remark-date { font-size: 11px; color: var(--muted); }
    .empty-state {
      text-align: center; padding: 48px 20px; color: var(--muted);
    }
    .empty-state-icon { font-size: 32px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* ── Toast ── */
    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      background: #18181B; color: #fff; padding: 10px 18px; border-radius: 8px;
      font-size: 13px; font-weight: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      animation: slideUp 0.2s ease; max-width: 320px;
    }
    .toast.success { background: #166534; }
    .toast.error   { background: #991B1B; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Loading ── */
    .spinner {
      display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border);
      border-top-color: var(--accent2); border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-row td { text-align: center; padding: 40px; }
  </style>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="/logo.png" alt="FM" onerror="this.style.display='none'"/>
      <span>Admin Console</span>
    </div>
    <a class="nav-item" href="/admin/"><span class="nav-icon">📊</span> Dashboard</a>
    <a class="nav-item active" href="/admin/#batches"><span class="nav-icon">📦</span> Batches</a>
    <a class="nav-item" href="/admin/#scans"><span class="nav-icon">🔍</span> Scan Logs</a>
    <a class="nav-item" href="/admin/#alerts"><span class="nav-icon">🚨</span> Alerts</a>
    <a class="nav-item" href="/admin/#network"><span class="nav-icon">🌐</span> Network</a>
    <div style="flex:1"></div>
    <div style="padding: 16px 20px; border-top: 1px solid var(--border); font-size: 11px; color: var(--muted);">
      API Key<br>
      <span id="key-preview" style="font-family:monospace; font-size:10px;"></span>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="page-header">
      <a class="back-btn" href="/admin/#batches">← Back to Batches</a>
      <div>
        <div class="page-title" id="page-title">Batch Detail</div>
        <div class="page-subtitle" id="page-subtitle">Loading…</div>
      </div>
      <div style="margin-left:auto; display:flex; gap:8px;">
        <button class="btn btn-download" onclick="downloadZip()">⬇ Download Labels ZIP</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Units</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Scans</div>
        <div class="stat-value" id="stat-scans">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Remarks Used</div>
        <div class="stat-value" id="stat-remarks">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Country</div>
        <div class="stat-value" id="stat-country" style="font-size:18px;">—</div>
      </div>
    </div>

    <!-- Add Remark -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Add Remark to Serial Range</span>
      </div>
      <div class="card-body">
        <div class="remark-form">
          <div class="form-group">
            <label class="form-label">From Seq</label>
            <input type="number" class="form-input" id="from-seq" min="1" placeholder="00001"/>
          </div>
          <div class="form-group">
            <label class="form-label">To Seq</label>
            <input type="number" class="form-input" id="to-seq" min="1" placeholder="00010"/>
          </div>
          <div class="form-group">
            <label class="form-label">Remark</label>
            <input type="text" class="form-input remark-text" id="remark-text" placeholder="e.g. Dealer A — Kerala"/>
          </div>
          <button class="btn btn-primary" onclick="applyRemark()">Apply Remark</button>
          <button class="btn btn-outline" onclick="clearRemark()">Clear Range</button>
        </div>
      </div>
    </div>

    <!-- Serial Table -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Serial Numbers</span>
        <div class="filter-bar">
          <select class="filter-select" id="remark-filter" onchange="filterByRemark()">
            <option value="">All serials</option>
          </select>
          <button class="btn btn-outline btn-sm" onclick="loadSerials()">↺ Refresh</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Seq #</th>
              <th>Serial</th>
              <th>Status</th>
              <th>Scans</th>
              <th>Remark</th>
              <th>Updated</th>
            </tr>
          </thead>
          <tbody id="serial-tbody">
            <tr class="loading-row"><td colspan="6"><div class="spinner"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
  const adminKey  = window.__ADMIN_KEY__ || '';
  const batchCode = window.location.pathname.split('/').pop();

  document.getElementById('key-preview').textContent =
    adminKey ? adminKey.slice(0, 8) + '…' : '—';

  function toast(msg, type = '') {
    const el = document.createElement('div');
    el.className = 'toast' + (type ? ' ' + type : '');
    el.textContent = msg;
    const c = document.getElementById('toast-container');
    c.appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }

  function api(path, opts = {}) {
    return fetch(path, {
      ...opts,
      headers: { 'x-admin-key': adminKey, 'Content-Type': 'application/json', ...(opts.headers || {}) },
      body: opts.body ? JSON.stringify(opts.body) : undefined,
    }).then(async r => {
      if (!r.ok) { const t = await r.text(); throw new Error(t || r.status); }
      return r.json();
    });
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  async function loadBatchDetail() {
    try {
      const { batch, stats } = await api(`/admin/batches/${encodeURIComponent(batchCode)}`);
      document.getElementById('page-title').textContent = batchCode;
      document.getElementById('page-subtitle').textContent =
        (batch.product_name || '—') + ' · Created ' + fmtDate(batch.created_at);
      document.getElementById('stat-total').textContent   = stats.total.toLocaleString();
      document.getElementById('stat-scans').textContent   = stats.totalScans.toLocaleString();
      document.getElementById('stat-remarks').textContent = stats.remarkCount.toLocaleString();
      document.getElementById('stat-country').textContent = batch.target_country || '—';

      // Pre-fill range
      document.getElementById('from-seq').value = 1;
      document.getElementById('to-seq').value   = stats.maxSeq || stats.total;
    } catch (err) {
      toast('Failed to load batch: ' + err.message, 'error');
    }
  }

  async function loadRemarkFilter() {
    try {
      const remarks = await api(`/admin/batches/${encodeURIComponent(batchCode)}/remarks`);
      const sel = document.getElementById('remark-filter');
      // Keep first option
      while (sel.options.length > 1) sel.remove(1);
      for (const r of remarks) {
        const opt = document.createElement('option');
        opt.value = r; opt.textContent = r;
        sel.appendChild(opt);
      }
    } catch (_) {}
  }

  async function loadSerials(remarkFilter) {
    const tbody = document.getElementById('serial-tbody');
    tbody.innerHTML = '<tr class="loading-row"><td colspan="6"><div class="spinner"></div></td></tr>';

    try {
      let url = `/admin/batches/${encodeURIComponent(batchCode)}/serials`;
      if (remarkFilter) url += `?remark=${encodeURIComponent(remarkFilter)}`;
      const rows = await api(url);

      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-state-icon">📋</div><p>No serials found.</p></div></td></tr>`;
        return;
      }

      tbody.innerHTML = rows.map(r => {
        const seq = String(r.seq).padStart(5, '0');
        const status = r.is_active
          ? '<span class="status-badge status-active">● Active</span>'
          : '<span class="status-badge status-inactive">● Recalled</span>';
        const remark = r.remark
          ? `<span class="remark-pill" title="${esc(r.remark)}">${esc(r.remark)}</span>`
          : `<span class="no-remark">—</span>`;
        return `<tr>
          <td><span class="seq-badge">${seq}</span></td>
          <td><span class="serial-text" title="${esc(r.serial)}">${esc(r.serial)}</span></td>
          <td>${status}</td>
          <td class="scan-count">${r.scan_count}</td>
          <td class="remark-cell">${remark}</td>
          <td class="remark-date">${r.remark_updated_at ? fmtDate(r.remark_updated_at) : '—'}</td>
        </tr>`;
      }).join('');
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:24px;color:#dc2626;">Error: ${esc(err.message)}</td></tr>`;
    }
  }

  function filterByRemark() {
    const val = document.getElementById('remark-filter').value;
    loadSerials(val || null);
  }

  async function applyRemark() {
    const fromSeq    = parseInt(document.getElementById('from-seq').value, 10);
    const toSeq      = parseInt(document.getElementById('to-seq').value, 10);
    const remarkText = document.getElementById('remark-text').value.trim();

    if (!fromSeq || !toSeq || !remarkText) { toast('Fill in all fields', 'error'); return; }
    if (fromSeq > toSeq) { toast('From must be ≤ To', 'error'); return; }

    try {
      await api(`/admin/batches/${encodeURIComponent(batchCode)}/serials/remark`, {
        method: 'POST',
        body: { from_seq: fromSeq, to_seq: toSeq, remark: remarkText },
      });
      toast(`Remark applied to ${toSeq - fromSeq + 1} serial(s)`, 'success');
      await Promise.all([loadSerials(), loadRemarkFilter(), loadBatchDetail()]);
    } catch (err) {
      toast('Failed: ' + err.message, 'error');
    }
  }

  async function clearRemark() {
    const fromSeq = parseInt(document.getElementById('from-seq').value, 10);
    const toSeq   = parseInt(document.getElementById('to-seq').value, 10);
    if (!fromSeq || !toSeq) { toast('Fill in From and To', 'error'); return; }

    try {
      await api(`/admin/batches/${encodeURIComponent(batchCode)}/serials/remark`, {
        method: 'DELETE',
        body: { from_seq: fromSeq, to_seq: toSeq },
      });
      toast('Remark cleared', 'success');
      await Promise.all([loadSerials(), loadRemarkFilter(), loadBatchDetail()]);
    } catch (err) {
      toast('Failed: ' + err.message, 'error');
    }
  }

  function downloadZip() {
    const url = `/admin/batches/${encodeURIComponent(batchCode)}/export?key=${encodeURIComponent(adminKey)}`;
    const a   = document.createElement('a');
    a.href = url; a.download = `${batchCode}-labels.zip`;
    document.body.appendChild(a); a.click(); a.remove();
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Init
  Promise.all([loadBatchDetail(), loadSerials(), loadRemarkFilter()]);
</script>
</body>
</html>
